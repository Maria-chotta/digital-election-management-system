{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Login — Digital Election</title>
    <link rel="stylesheet" href="{% static 'css/elections.css' %}">
    <style>
        .login-container { max-width: 400px; margin: 100px auto; }
        .login-form { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: 600; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 1rem; }
        .btn { background: #0066cc; color: #fff; padding: 10px 20px; border: 0; border-radius: 4px; cursor: pointer; font-size: 1rem; width: 100%; }
        .btn:hover { background: #0052a3; }
        .error { color: #d32f2f; margin-bottom: 15px; }
        .info { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        a { color: #0066cc; text-decoration: none; }
    </style>
</head>
<body style="background: #f7f8fb;">
<div class="login-container">
    <div class="login-form">
        <h1 style="text-align: center; margin-bottom: 30px;">Digital Election System</h1>
        
        {% if messages %}
            {% for message in messages %}
                <div class="error">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn">Login</button>
        </form>
        
        <div class="info">
            Demo: Use username=<strong>admin</strong>, password=<strong>admin</strong>
        </div>
    </div>
</div>
</body>
</html>
