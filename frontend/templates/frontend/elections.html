{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Elections</title>
    <link rel="stylesheet" href="{% static 'css/elections.css' %}">
    <style>
        .nav { display: flex; gap: 10px; margin-bottom: 20px; }
        .nav a { background: #0066cc; color: #fff; padding: 8px 15px; border-radius: 4px; text-decoration: none; font-size: 0.9rem; }
        .nav a:hover { background: #0052a3; }
        .logout-link { background: #d32f2f; }
        .logout-link:hover { background: #b71c1c; }
    </style>
</head>
<body>
<main class="container">
    <div class="nav">
        {% if user.is_authenticated %}
            <span style="color: #666;">Welcome, <strong>{{ user.username }}</strong></span>
            {% if user.is_staff %}
                <a href="{% url 'admin_dashboard' %}">Admin Dashboard</a>
            {% endif %}
            <a href="{% url 'results' %}">Results</a>
            <a href="{% url 'logout' %}" class="logout-link">Logout</a>
        {% else %}
            <a href="{% url 'login' %}">Login</a>
        {% endif %}
    </div>
    
    <header>
        <h1>Elections</h1>
        <div class="voter-box">
            <label for="voterId">Voter ID (optional):</label>
            <input id="voterId" type="number" placeholder="Enter user id to vote as">
        </div>
    </header>

    <section id="elections" aria-live="polite">
        <p class="loading">Loading elections…</p>
    </section>

    <template id="election-template">
        <article class="election">
            <h2 class="title"></h2>
            <p class="desc"></p>
            <div class="candidates">
                <p class="c-loading">Loading candidates…</p>
            </div>
            <div class="results-link">
                <button class="show-results">Show Results</button>
            </div>
        </article>
    </template>
</main>

<script src="{% static 'js/elections.js' %}" defer></script>
</body>
</html>
