{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ title|default:"Election Admin" }}</title>
  <link rel="stylesheet" href="{% static 'styles.css' %}" />
  <style>
    .admin-shell{max-width:1100px;margin:2rem auto;padding:0 1rem;}
    .admin-card{background:white;border-radius:16px;box-shadow:0 10px 30px rgba(0,0,0,.08);padding:1.5rem;}
    .admin-header{display:flex;align-items:flex-start;justify-content:space-between;gap:1rem;margin-bottom:1.25rem;}
    .admin-header h1{color:var(--primary-color);font-size:1.8rem;margin:0;}
    .admin-header p{color:#6b7280;margin:.3rem 0 0;}
    .admin-actions{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:flex-end;}
    .btn-danger{background:var(--danger-color);color:white;border:none;padding:.75rem 1.25rem;border-radius:8px;font-weight:700;cursor:pointer;box-shadow:var(--shadow);}
    .btn-danger:hover{filter:brightness(.95)}
    .admin-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:1rem;}
    @media (max-width:900px){.admin-grid{grid-template-columns:1fr;}}
    .table{width:100%;border-collapse:collapse;margin-top:1rem;}
    .table th,.table td{padding:.75rem .5rem;border-bottom:1px solid #eef2ff;text-align:left;vertical-align:top;}
    .badge{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .6rem;border-radius:999px;background:#eff6ff;color:#1d4ed8;font-weight:700;font-size:.85rem;}
    textarea{min-height:110px;resize:vertical;}
    .form-group textarea,.form-group select{width:100%;padding:.75rem;border:2px solid var(--border-color);border-radius:6px;font-size:1rem;transition:border-color .3s ease;}
    .muted{color:#6b7280;}
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <h1 class="logo">🎓 Election Admin</h1>
      <ul class="nav-menu">
        <li><a href="{% url 'admin:index' %}">Django Admin</a></li>
        <li><a href="{% url 'elections_page' %}">Voter Portal</a></li>
      </ul>
    </div>
  </nav>

  <main class="admin-shell">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
